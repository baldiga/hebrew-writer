          - paragraph [ref=e184]: "Note: v1.1 removes duplicate speeches from different versions of the original protocol files."
          - heading "Abstract" [level=2] [ref=e185]:
            - link [ref=e186] [cursor=pointer]:
              - /url: "#abstract"
              - img [ref=e188]
            - generic [ref=e190]: Abstract
          - paragraph [ref=e191]: We introduce IsraParlTweet, a new linked corpus of Hebrew-language parliamentary discussions from the Knesset (Israeli Parliament) between the years 1992-2023 and Twitter posts made by Members of the Knesset between the years 2008-2023, containing a total of 294.5 million Hebrew tokens. In addition to raw text, the corpus contains comprehensive metadata on speakers and Knesset sessions as well as several linguistic annotations. As a result, IsraParlTweet can be used to conduct a wide variety of quantitative and qualitative analyses and provide valuable insights into political discourse in Israel.
          - heading "Dataset Description" [level=1] [ref=e192]:
            - link [ref=e193] [cursor=pointer]:
              - /url: "#dataset-description"
              - img [ref=e195]
            - generic [ref=e197]: Dataset Description
          - paragraph [ref=e198]: "The corpus is divided into four main sections: Knesset Sessions, Twitter Posts, Office Sessions, and Linguistic Analyses."
          - heading "Knesset Sessions - knesset_speeches.csv" [level=2] [ref=e199]:
            - link [ref=e200] [cursor=pointer]:
              - /url: "#knesset-sessions---knesset_speechescsv"
              - img [ref=e202]
            - generic [ref=e204]: Knesset Sessions - knesset_speeches.csv
          - paragraph [ref=e205]: "This section contains the utterances of the MKs on the Knesset floor, in the order in which they appeared in the consecutive plenary protocol files. The utterances vary in length and may contain anything from a few words to a complete speech. Interruptions and interjections are preserved as they appear in the protocols. In total, this section contains approximately 4.5M individual utterances. The data is organized in CSV format, where each row represents a single utterance and contains the following fields:"
          - list [ref=e206]:
            - listitem [ref=e207]:
              - strong [ref=e208]: text
              - text: ": The text of the utterance."
            - listitem [ref=e209]:
              - strong [ref=e210]: uuid
              - text: ": A unique text identifier used for associating the text with separately provided morphological analysis."
            - listitem [ref=e211]:
              - strong [ref=e212]: knesset
              - text: ": Knesset term."
            - listitem [ref=e213]:
              - strong [ref=e214]: session_number
              - text: ": Session number in current Knesset term."
            - listitem [ref=e215]:
              - strong [ref=e216]: date
              - text: ": Date of session."
            - listitem [ref=e217]:
              - strong [ref=e218]: person_id
              - text: ": Numeric identifier for speaker. Numeric identifiers are only assigned to MKs. 3% of speakers lack an identifier in cases of non-MK politicians (e.g. president, non-MK ministers), administrative Knesset workers, or guests, or if the matching MK could not be determined. Speakers are assigned an identifier if they were MKs in the time period of the corpus, even if they are not MKs at the time the utterance is made (e.g. presidents that were previously MKs)."
            - listitem [ref=e219]:
              - strong [ref=e220]: canonical_name
              - text: ": The canonical name (first name and surname) of the speaker. Only present for MKs for which an identifier can be determined."
            - listitem [ref=e221]:
              - strong [ref=e222]: name
              - text: ": The name of the speaker as extracted from the protocol."
            - listitem [ref=e223]:
              - strong [ref=e224]: chair
              - text: ": Indicator for whether or not the speaker was the chair of the session."
            - listitem [ref=e225]:
              - strong [ref=e226]: topic
              - text: ": Topic of discussion or agenda item."
            - listitem [ref=e227]:
              - strong [ref=e228]: topic_extra
              - text: ": Additional information on the topic (e.g. subtitle, legislation proposal number)."
            - listitem [ref=e229]:
              - strong [ref=e230]: qa
              - text: ": Indicator for whether or not the utterance is part of a Questions and Answers session."
            - listitem [ref=e231]:
              - strong [ref=e232]: query
              - text: ": The written query to which the utterance is an oral response."
            - listitem [ref=e233]:
              - strong [ref=e234]: only_read
              - text: ": Indicator for whether or not the utterance was a Q&A response that was read and not delivered by the answerer orally."
          - heading "Twitter Posts - contact authors for access" [level=2] [ref=e235]:
            - link [ref=e236] [cursor=pointer]:
              - /url: "#twitter-posts---contact-authors-for-access"
              - img [ref=e238]
            - generic [ref=e240]: Twitter Posts - contact authors for access
          - list [ref=e241]:
            - listitem [ref=e242]:
              - strong [ref=e243]: text
              - text: ": The text of the tweet."
            - listitem [ref=e244]:
              - strong [ref=e245]: uuid
              - text: ": A unique text identifier used for associating the text with separately provided morphological analysis."
            - listitem [ref=e246]:
              - strong [ref=e247]: tweet_id
              - text: ": Twitter's unique tweet identifier."
            - listitem [ref=e248]:
              - strong [ref=e249]: date
              - text: ": Date of the tweet."
            - listitem [ref=e250]:
              - strong [ref=e251]: knesset
              - text: ": The Knesset term corresponding to the date of the tweet."
            - listitem [ref=e252]:
              - strong [ref=e253]: person_id
              - text: ": Numeric identifier for the tweet poster. All rows have an identifier since only posts by MKs were collected. However, note that the poster was not necessarily serving as an MK at the time of posting."
            - listitem [ref=e254]:
              - strong [ref=e255]: user_id
              - text: ": Twitter user ID number."
            - listitem [ref=e256]:
              - strong [ref=e257]: username
              - text: ": Twitter handle name."
            - listitem [ref=e258]:
              - strong [ref=e259]: name
              - text: ": The canonical name (first name + surname) of the poster."
            - listitem [ref=e260]:
              - strong [ref=e261]: likes
              - text: ": Number of likes received at collection time."
            - listitem [ref=e262]:
              - strong [ref=e263]: retweets
              - text: ": Number of retweets at collection time."
            - listitem [ref=e264]:
              - strong [ref=e265]: replies
              - text: ": Number of replies at collection time."
            - listitem [ref=e266]:
              - strong [ref=e267]: quotes
              - text: ": Number of quotes at collection time."
          - heading "Office Sessions - metadata.csv" [level=2] [ref=e268]:
