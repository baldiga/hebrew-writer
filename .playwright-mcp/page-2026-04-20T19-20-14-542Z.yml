              - img [ref=e271]
            - generic [ref=e273]: Office Sessions - metadata.csv
          - paragraph [ref=e274]: "This section contains metadata describing the office sessions of the MKs. An office session is a period of time in which a person served as an MK under a given party or faction. The data is organized in CSV format, where each row, representing a single office session, contains the following fields:"
          - list [ref=e275]:
            - listitem [ref=e276]:
              - strong [ref=e277]: start_date
              - text: ": Start date of office session."
            - listitem [ref=e278]:
              - strong [ref=e279]: end_date
              - text: ": End date of office session."
            - listitem [ref=e280]:
              - strong [ref=e281]: knesset
              - text: ": Relevant Knesset term."
            - listitem [ref=e282]:
              - strong [ref=e283]: person_id
              - text: ": A unique personal id used for matching with Knesset Session utterances and Twitter Posts."
            - listitem [ref=e284]:
              - strong [ref=e285]: first_name
              - text: ": MK's first name."
            - listitem [ref=e286]:
              - strong [ref=e287]: surname
              - text: ": MK's surname."
            - listitem [ref=e288]:
              - strong [ref=e289]: gender
              - text: ": MK's gender."
            - listitem [ref=e290]:
              - strong [ref=e291]: faction
              - text: ": Name of faction under which the MK served."
            - listitem [ref=e292]:
              - strong [ref=e293]: faction_id
              - text: ": Unique identifier for faction."
            - listitem [ref=e294]:
              - strong [ref=e295]: party_name
              - text: ": Unified party name under which the MK served."
            - listitem [ref=e296]:
              - strong [ref=e297]: dob
              - text: ": MK's date of birth."
            - listitem [ref=e298]:
              - strong [ref=e299]: cob
              - text: ": MK's country of birth."
            - listitem [ref=e300]:
              - strong [ref=e301]: yod
              - text: ": MK's year of death."
            - listitem [ref=e302]:
              - strong [ref=e303]: yoi
              - text: ": MK's year of immigration (Aliyah) to Israel."
            - listitem [ref=e304]:
              - strong [ref=e305]: city
              - text: ": MK's city of residence."
            - listitem [ref=e306]:
              - strong [ref=e307]: languages
              - text: ": MK's spoken languages – a comma separated string."
          - heading "Linguistic Analyses" [level=2] [ref=e308]:
            - link [ref=e309] [cursor=pointer]:
              - /url: "#linguistic-analyses"
              - img [ref=e311]
            - generic [ref=e313]: Linguistic Analyses
          - paragraph [ref=e314]: All JSON files utilize the texts' uuid as keys.
          - list [ref=e315]:
            - listitem [ref=e316]:
              - strong [ref=e317]: knesset_sentences.json
